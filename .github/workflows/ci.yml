# 拉取/推送时执行生产构建，避免未类型检查或 Prisma/Next 配置问题进入主分支。

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # 构建阶段不连库；仅满足 Prisma Client 与部分代码对 URL 存在性的期待
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/mybroker_ci?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
